
<style>
  .app { padding: 1.5rem 0; font-family: var(--font-sans); }
  .title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 0.25rem; }
  .subtitle { font-size: 14px; color: var(--color-text-secondary); margin: 0 0 1.5rem; }
  .section-label { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 8px; }
  .punch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
  .punch-btn { border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); border-radius: var(--border-radius-md); padding: 10px 6px; cursor: pointer; text-align: center; transition: transform 0.08s, background 0.1s; user-select: none; }
  .punch-btn:hover { background: var(--color-background-secondary); }
  .punch-btn:active { transform: scale(0.95); }
  .punch-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .punch-btn .name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
  .punch-btn .key { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .sequence-area { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1rem 1.25rem; min-height: 80px; margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }
  .seq-chip { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 4px 10px; font-size: 13px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 6px; cursor: default; animation: pop 0.12s ease; }
  .seq-chip.playing { border-color: #378ADD; color: #185FA5; background: #E6F1FB; }
  @keyframes pop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .empty-hint { font-size: 13px; color: var(--color-text-secondary); align-self: center; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .btn-primary { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 18px; font-size: 14px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .btn-primary:hover { background: var(--color-background-secondary); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { border-color: #E24B4A; color: #A32D2D; }
  .btn-danger:hover { background: #FCEBEB; }
  .tempo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .tempo-row label { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
  .tempo-row input[type=range] { flex: 1; }
  .tempo-row span { font-size: 13px; font-weight: 500; min-width: 60px; color: var(--color-text-primary); }
  .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 48px; margin-bottom: 1rem; }
  .bar { flex: 1; background: var(--color-border-tertiary); border-radius: 2px; transition: height 0.05s, background 0.05s; min-height: 4px; }
  .bar.active { background: #378ADD; }
  .preset-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .preset-chip { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--color-text-secondary); cursor: pointer; }
  .preset-chip:hover { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--color-border-secondary); }
</style>

<div class="app">
  <h2 class="sr-only">Punch audio sequence generator — add punches to build a combo and play it back</h2>
  <p class="title">Punch sequence generator</p>
  <p class="subtitle">Build a combo, set the tempo, and play it back as audio.</p>

  <p class="section-label">Punch types</p>
  <div class="punch-grid" id="punchGrid"></div>

  <p class="section-label">Presets</p>
  <div class="preset-row" id="presets"></div>

  <p class="section-label">Sequence</p>
  <div class="sequence-area" id="seqArea"><span class="empty-hint">Tap a punch above or use keyboard shortcuts</span></div>

  <div class="tempo-row">
    <label>Tempo</label>
    <input type="range" id="tempo" min="40" max="200" step="1" value="90">
    <span id="tempoOut">90 BPM</span>
  </div>

  <div class="visualizer" id="viz"></div>

  <div class="controls">
    <button class="btn-primary" id="playBtn"><i class="ti ti-player-play" aria-hidden="true"></i> Play combo</button>
    <button class="btn-primary" id="undoBtn"><i class="ti ti-arrow-back-up" aria-hidden="true"></i> Undo</button>
    <button class="btn-primary btn-danger" id="clearBtn"><i class="ti ti-trash" aria-hidden="true"></i> Clear</button>
  </div>
</div>

<script>
const punches = [
  { id:'jab',    name:'Jab',         key:'1', color:[0.1, 0.6, 0.9],  emoji:'👊', freq:180, dur:0.07, gain:0.7 },
  { id:'cross',  name:'Cross',       key:'2', color:[0.9, 0.3, 0.1],  emoji:'✊', freq:140, dur:0.10, gain:0.9 },
  { id:'hook',   name:'Hook',        key:'3', color:[0.2, 0.8, 0.3],  emoji:'🤜', freq:110, dur:0.13, gain:1.0 },
  { id:'upper',  name:'Uppercut',    key:'4', color:[0.8, 0.6, 0.1],  emoji:'👆', freq:90,  dur:0.16, gain:1.0 },
  { id:'body',   name:'Body shot',   key:'5', color:[0.6, 0.2, 0.8],  emoji:'💢', freq:70,  dur:0.18, gain:0.85},
  { id:'slip',   name:'Slip',        key:'S', color:[0.5, 0.5, 0.5],  emoji:'↔️', freq:400, dur:0.05, gain:0.35},
  { id:'block',  name:'Block',       key:'B', color:[0.3, 0.5, 0.7],  emoji:'🛡', freq:300, dur:0.08, gain:0.4 },
  { id:'rest',   name:'Rest',        key:'R', color:[0.4, 0.4, 0.4],  emoji:'⏸', freq:0,   dur:0.00, gain:0.0 },
];

const presets = [
  { name: '1-2', seq: ['jab','cross'] },
  { name: '1-2-3', seq: ['jab','cross','hook'] },
  { name: '1-2-3-2', seq: ['jab','cross','hook','cross'] },
  { name: '1-1-2', seq: ['jab','jab','cross'] },
  { name: 'Body-Head', seq: ['body','body','cross','hook'] },
  { name: '1-2-Upper', seq: ['jab','cross','upper'] },
];

let sequence = [];
let audioCtx = null;
let playing = false;
let stopRequested = false;
let bars = [];

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function makeNoise(ctx, dur) {
  const len = Math.ceil(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1);
  return buf;
}

function playPunchSound(p, when, ctx) {
  if (p.freq === 0) return;
  const g = ctx.createGain();
  const dist = ctx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i=0;i<256;i++) { const x=i/128-1; curve[i]=x*(Math.PI+200)/(Math.PI+200*Math.abs(x)); }
  dist.curve = curve;

  const noiseSource = ctx.createBufferSource();
  noiseSource.buffer = makeNoise(ctx, p.dur + 0.06);

  const filt = ctx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.setValueAtTime(p.freq * 2.2, when);
  filt.frequency.exponentialRampToValueAtTime(p.freq * 0.5, when + p.dur + 0.04);
  filt.Q.value = 1.2;

  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(p.freq, when);
  osc.frequency.exponentialRampToValueAtTime(p.freq * 0.3, when + p.dur * 0.6);

  const oscGain = ctx.createGain();
  oscGain.gain.setValueAtTime(p.gain * 0.5, when);
  oscGain.gain.exponentialRampToValueAtTime(0.001, when + p.dur * 0.7);

  g.gain.setValueAtTime(p.gain, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + p.dur + 0.06);

  noiseSource.connect(filt); filt.connect(dist); dist.connect(g);
  osc.connect(oscGain); oscGain.connect(g);
  g.connect(ctx.destination);

  noiseSource.start(when); noiseSource.stop(when + p.dur + 0.1);
  osc.start(when); osc.stop(when + p.dur + 0.1);
}

function buildGrid() {
  const grid = document.getElementById('punchGrid');
  grid.innerHTML = '';
  punches.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'punch-btn';
    btn.innerHTML = `<span class="icon">${p.emoji}</span><span class="name">${p.name}</span><span class="key">[${p.key}]</span>`;
    btn.onclick = () => addPunch(p);
    grid.appendChild(btn);
  });
}

function buildPresets() {
  const row = document.getElementById('presets');
  row.innerHTML = '';
  presets.forEach(pr => {
    const chip = document.createElement('button');
    chip.className = 'preset-chip';
    chip.textContent = pr.name;
    chip.onclick = () => { sequence = pr.seq.map(id => punches.find(p=>p.id===id)); renderSeq(); };
    row.appendChild(chip);
  });
}

function addPunch(p) {
  sequence.push(p);
  renderSeq();
  const ctx = getAudioCtx();
  playPunchSound(p, ctx.currentTime, ctx);
}

function renderSeq() {
  const area = document.getElementById('seqArea');
  area.innerHTML = '';
  if (!sequence.length) { area.innerHTML = '<span class="empty-hint">Tap a punch above or use keyboard shortcuts</span>'; renderViz(); return; }
  sequence.forEach((p, i) => {
    const chip = document.createElement('div');
    chip.className = 'seq-chip';
    chip.id = 'chip-'+i;
    chip.innerHTML = `${p.emoji} ${p.name}`;
    area.appendChild(chip);
  });
  renderViz();
}

function renderViz() {
  const viz = document.getElementById('viz');
  viz.innerHTML = '';
  bars = [];
  const n = Math.max(sequence.length, 8);
  for (let i=0; i<n; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    const h = i < sequence.length ? (sequence[i].gain * 40 + 8) : 8;
    b.style.height = h+'px';
    viz.appendChild(b);
    bars.push(b);
  }
}

async function playSequence() {
  if (!sequence.length || playing) return;
  playing = true; stopRequested = false;
  const btn = document.getElementById('playBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader" aria-hidden="true"></i> Playing…';

  const ctx = getAudioCtx();
  const bpm = parseInt(document.getElementById('tempo').value);
  const beatMs = (60000 / bpm);

  for (let i = 0; i < sequence.length; i++) {
    if (stopRequested) break;
    const p = sequence[i];
    const chip = document.getElementById('chip-'+i);
    if (chip) chip.classList.add('playing');
    if (bars[i]) { bars[i].classList.add('active'); }
    playPunchSound(p, ctx.currentTime, ctx);
    await new Promise(r => setTimeout(r, beatMs));
    if (chip) chip.classList.remove('playing');
    if (bars[i]) bars[i].classList.remove('active');
  }

  playing = false;
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Play combo';
}

document.getElementById('playBtn').onclick = playSequence;
document.getElementById('clearBtn').onclick = () => { sequence = []; renderSeq(); };
document.getElementById('undoBtn').onclick = () => { if (sequence.length) { sequence.pop(); renderSeq(); } };

document.getElementById('tempo').oninput = function() {
  document.getElementById('tempoOut').textContent = this.value + ' BPM';
};

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const key = e.key.toUpperCase();
  const p = punches.find(p => p.key === key);
  if (p) addPunch(p);
  if (e.key === ' ') { e.preventDefault(); playSequence(); }
});

buildGrid();
buildPresets();
renderViz();
</script>
